org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8
# The Kotlin compile daemon gets its own heap. Keep both moderate: too little and
# a Compose build GC-thrashes, too much and it swaps on a smaller runner -- either
# way the build crawls. Around 3g + 2g stays safe on the shared runners.
kotlin.daemon.jvmargs=-Xmx2g
org.gradle.caching=true
org.gradle.configuration-cache=true

kotlin.code.style=official

android.useAndroidX=true
android.nonTransitiveRClass=true
