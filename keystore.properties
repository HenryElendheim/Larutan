# Signing credentials for the release build. This is a self-signed key for
# sideloading the app onto a phone -- it is deliberately checked in so any clean
# checkout (including a fresh cloud build) can produce a signed release APK.
# It is NOT a secret meant to protect anything; if you ever publish through a
# store, generate a private key and keep it out of the repo.
storeFile=larutan-release.jks
storePassword=larutan
keyAlias=larutan
keyPassword=larutan
