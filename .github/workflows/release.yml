# Builds the signed release APK on GitHub's runners, where the Android toolchain
# and Google's Maven are reachable. On a version tag it also publishes the APK as
# a GitHub release, so a clean tag push turns into a playable download.
name: Release APK

on:
  push:
    branches: [testing]   # build-check every push to testing
    tags: ["v*"]          # a version tag also publishes the release
  workflow_dispatch:      # and it can be run by hand

permissions:
  contents: write         # needed to create the release and upload the APK

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up the Android SDK
        uses: android-actions/setup-android@v3

      # compileSdk 35 -> make sure the platform and build-tools are present.
      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # The signing key is checked into the repo, so a clean checkout comes out
      # signed and installable -> no secrets to wire up.
      - name: Build the signed release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      # Keep the APK on every run so it can be grabbed and sideloaded even without a tag.
      - name: Upload the APK as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: larutan-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      # Pull just the top (newest) section out of RELEASES.md for the release body.
      - name: Gather the release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: awk '/^## /{c++} c==1{print} c==2{exit}' RELEASES.md > notes.md

      - name: Publish the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Larutan ${{ github.ref_name }}
          body_path: notes.md
          files: app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
